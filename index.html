<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FraudGuard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="shell">

  <!-- header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="3.8" fill="white"/>
        <circle cx="10" cy="10" r="8.2" stroke="white" stroke-width="1.2" fill="none"/>
        <line x1="10" y1="1" x2="10" y2="4" stroke="white" stroke-width="1.4"/>
        <line x1="10" y1="16" x2="10" y2="19" stroke="white" stroke-width="1.4"/>
        <line x1="1" y1="10" x2="4" y2="10" stroke="white" stroke-width="1.4"/>
        <line x1="16" y1="10" x2="19" y2="10" stroke="white" stroke-width="1.4"/>
      </svg>
    </div>
    <div class="htext">
      <h1>Fraud<em>Guard</em></h1>
      <p>AI content &middot; fake products &middot; fraudulent sellers</p>
    </div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab on" data-tab="image"><i>◈</i> Image scan</button>
    <button class="tab" data-tab="text"><i>❋</i> Text scan</button>
    <button class="tab" data-tab="product"><i>◉</i> Product check</button>
    <button class="tab" data-tab="seller"><i>◎</i> Seller check</button>
  </div>

  <!-- input panel -->
  <div class="panel">
    <div class="phead">
      <span class="plabel" id="plabel">◈ Detect AI-generated images</span>
      <button class="upbtn" id="upbtn" onclick="document.getElementById('fi').click()">Upload image</button>
      <input type="file" id="fi" accept="image/*" style="display:none"/>
    </div>

    <div class="preview" id="prev">
      <img class="thumb" id="thumb" src="" alt=""/>
      <div class="pinfo">
        <p id="fname">—</p>
        <p id="fsize">—</p>
      </div>
      <button class="rmbtn" onclick="clearImg()">Remove</button>
    </div>

    <textarea id="ta" placeholder="Paste an image URL — e.g. https://example.com/photo.jpg"></textarea>

    <div class="pfoot">
      <span class="hint" id="hint">Paste a public URL or upload a file</span>
      <button class="abtn" id="abtn" onclick="doAnalyze()" disabled>Analyze →</button>
    </div>
  </div>

  <!-- loading -->
  <div class="loading" id="loading" style="display:none">
    <div class="llabel">SCANNING</div>
    <div class="lmsg">Looking for fraud signals<span class="dots">...</span></div>
  </div>

  <!-- error -->
  <div class="errbox" id="errbox" style="display:none"></div>

  <!-- result -->
  <div class="result" id="result" style="display:none">
    <div class="rtop">
      <div class="vrow">
        <span class="badge vg" id="rv">—</span>
        <span class="conf" id="rconf">—</span>
      </div>
      <div class="riskrow">
        <span class="risklbl">RISK</span>
        <div class="risktrack"><div class="riskfill rf-safe" id="rbar" style="width:0%"></div></div>
        <span class="riskpct rp-safe" id="rpct">0%</span>
      </div>
    </div>
    <div class="rsummary" id="rsumm"></div>
    <div class="rsigs">
      <div class="siglabel">DETECTED SIGNALS</div>
      <div id="rsigs-list"></div>
    </div>
    <div class="rbands" id="rbands"></div>
  </div>

  <!-- empty -->
  <div class="empty" id="empty">
    <div class="eicon" id="eicon">◈</div>
    <p class="ehint" id="ehint">Drop an image URL or upload a file to start</p>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
